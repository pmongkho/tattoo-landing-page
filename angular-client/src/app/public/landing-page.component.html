<div class="min-h-screen bg-[#efefef] px-6 py-10 text-[#111111] sm:py-14">
  <main class="mx-auto w-full max-w-[620px]">
    <div class="flex justify-center">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8f/Chinese_double_happiness_%28shu%C4%81ngx%C7%90%29.svg/512px-Chinese_double_happiness_%28shu%C4%81ngx%C7%90%29.svg.png"
        alt="Logo"
        class="h-36 w-36 object-contain sm:h-44 sm:w-44"
      />
    </div>

    <h1 class="mt-4 text-center text-6xl font-normal tracking-wide sm:text-7xl">GET INKED</h1>
    <p class="mt-4 text-center text-lg text-slate-600 sm:text-[32px]">Ready to bring your vision to life? Connect with Robert.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="mt-12 space-y-7">
      <input type="hidden" formControlName="email" />
      <input type="hidden" formControlName="style" />
      <input type="hidden" formControlName="placement" />
      <input type="hidden" formControlName="size" />
      <input type="hidden" formControlName="description" />

      <label class="block space-y-3">
        <span class="text-sm uppercase tracking-[0.14em]">Full Name</span>
        <input class="h-14 w-full border border-slate-300 bg-[#e9ecef] px-4 text-lg placeholder:text-slate-500 focus:outline-none" placeholder="Enter your name" formControlName="name" />
      </label>

      <label class="block space-y-3">
        <span class="text-sm uppercase tracking-[0.14em]">Phone Number</span>
        <input class="h-14 w-full border border-slate-300 bg-[#e9ecef] px-4 text-lg placeholder:text-slate-500 focus:outline-none" placeholder="(555) 555-5555" formControlName="phoneNumber" />
      </label>

      <label class="block space-y-3">
        <span class="text-sm uppercase tracking-[0.14em]">How Soon Are You Looking To Get Your Next Tattoo?</span>
        <select class="h-14 w-full border border-slate-300 bg-[#e9ecef] px-4 text-lg text-slate-800 focus:outline-none" formControlName="timeline">
          <option value="" disabled>Select a timeframe</option>
          <option value="ASAP">ASAP (1-2 weeks)</option>
          <option value="Soon">Soon (this month)</option>
          <option value="Flexible">Flexible (1-3 months)</option>
          <option value="Just exploring">Just exploring ideas</option>
        </select>
      </label>

      <button class="h-14 w-full border border-slate-400 bg-[#efefef] text-sm uppercase tracking-[0.18em] transition hover:bg-slate-100" [disabled]="form.invalid">
        Connect With Robert →
      </button>

      <p class="border border-emerald-500/40 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-700" *ngIf="submitState === 'success'">Consultation submitted successfully.</p>
      <p class="border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-700" *ngIf="submitState === 'error'">Unable to submit consultation. Please try again.</p>
    </form>
  </main>
</div>
