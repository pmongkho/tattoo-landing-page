<div class="bg-[#fff] text-[#111111]">
	<section id="form" class="min-h-screen px-6 pb-10 sm:py-14">
		<main class="mx-auto w-full max-w-[620px]">
			<div class="flex justify-center">
				<img
					src="assets/images/logo.jpeg"
					alt="Logo"
					class="h-full w-full object-contain sm:h-44 sm:w-full"
				/>
			</div>

			<h1
				class="mt-4 text-center text-6xl font-normal tracking-wide sm:text-7xl"
				>GET INKED</h1
			>
			<p class="mt-4 text-center text-lg text-slate-600 sm:text-[32px]"
				>Ready to bring your vision to life? Connect with <b>Wo Hu.</b> </p
			>

			<form [formGroup]="form" (ngSubmit)="submit()" class="mt-12 space-y-7">
				<label class="block space-y-3">
					<span class="text-sm uppercase tracking-[0.14em]">Full Name</span>
					<input
						class="h-14 w-full border border-slate-300 bg-slate-100 px-4 text-lg placeholder:text-slate-500 focus:outline-none"
						placeholder="Enter your full name"
						formControlName="name"
					/>
					<p
						*ngIf="
							form.get('name')?.hasError('required') &&
							(form.get('name')?.dirty || form.get('name')?.touched)
						"
						class="text-sm text-rose-700"
						>Full name is required.</p
					>
					<p
						*ngIf="
							form.get('name')?.hasError('pattern') &&
							(form.get('name')?.dirty || form.get('name')?.touched)
						"
						class="text-sm text-rose-700"
						>Enter first and last name.</p
					>
				</label>

				<label class="block space-y-3">
					<span class="text-sm uppercase tracking-[0.14em]">Phone Number</span>
					<input
						class="h-14 w-full border border-slate-300 bg-slate-100 px-4 text-lg placeholder:text-slate-500 focus:outline-none"
						placeholder="(555) 555-5555"
						formControlName="phoneNumber"
					/>
				</label>

				<label class="block space-y-3">
					<span class="text-sm uppercase tracking-[0.14em]"
						>How Soon Are You Looking To Get Your Next Tattoo?</span
					>
					<select
						class="h-14 w-full border border-slate-300 bg-slate-100 px-4 text-lg text-slate-800 focus:outline-none"
						formControlName="timeline"
					>
						<option value="" disabled>Select a timeframe</option>
						<option value="ASAP">ASAP (1-2 weeks)</option>
						<option value="Soon">Soon (this month)</option>
						<option value="Flexible">Flexible (1-3 months)</option>
						<option value="Just exploring">Just exploring ideas</option>
					</select>
				</label>

				<button
					type="submit"
					class="h-14 w-full border border-slate-400 bg-slate-200 text-sm uppercase tracking-[0.18em] transition hover:bg-slate-100"
					[disabled]="form.invalid || isSubmitting"
					>Connect With Wo Hu →</button
				>

				<p
					class="border border-emerald-500/40 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-700"
					*ngIf="submitState === 'success'"
					>Consultation submitted successfully.</p
				>
				<p
					class="border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-700"
					*ngIf="submitState === 'error'"
					>Unable to submit consultation. Please try again.</p
				>
			</form>
		</main>
	</section>

	<section
		class="relative flex min-h-screen items-center justify-center overflow-hidden px-6"
	>
		<video
			class="absolute inset-0 h-full w-full object-cover"
			autoplay
			[muted]="true"
			loop
			playsinline
      			(loadedmetadata)="configureHeroVideo($event)"
		>
			<source
				[src]="heroVideoUrl"
				type="video/mp4"
			/>
			<!-- <source
				src="assets/videos/video.mp4"
				type="video/mp4"
			/> -->
		</video>
		<div class="absolute inset-0 bg-black/50"></div>
		<div
			class="relative z-10 mx-auto flex w-full max-w-[620px] flex-col items-center border border-white/20 px-6 py-12 text-white"
		>
			<img
				[src]="avatarImageUrl"
				alt="Wo Hu avatar"
				class="h-32 w-32 rounded-full border-4 border-white/80 object-cover"
			/>
			<h2 class="mt-6 text-center text-5xl tracking-[0.06em]">WO HU</h2>
			<p class="mt-2 text-center text-2xl text-white/75"
				>AFTERLIFE TATTOO STUDIO</p
			>
			<a
				href="#portfolio"
				class="mt-10 w-full border border-white py-3 text-center text-xl uppercase tracking-[0.14em]"
				>View Work</a
			>
			<a
				href="#form"
				class="mt-4 w-full bg-white py-3 text-center text-xl uppercase tracking-[0.14em] text-black"
				>Book Now</a
			>
		</div>
	</section>

	<section
		id="portfolio"
		class="flex min-h-screen flex-col justify-center px-4 py-10"
	>
		<h3 class="text-center text-5xl tracking-[0.08em]">THE WORK</h3>
		<div class="mx-auto mt-2 h-[2px] w-24 bg-[#2f2f2f]"></div>
		<p
			class="mt-8 text-center text-xl uppercase tracking-[0.12em] text-slate-600"
			>Swipe to explore</p
		>
		<div class="mt-8 flex snap-x snap-mandatory gap-4 overflow-x-auto pb-3">
			<article
				*ngFor="let item of portfolio"
				class="min-w-full snap-center border border-slate-300 bg-white p-3"
			>
				<img
					[src]="item.imageUrl"
					[alt]="item.title"
					class="h-[65vh] w-full object-cover"
          					loading="lazy"
					(onerror)="$any($event.target).src='assets/images/logo.jpeg'"
				/>
			</article>
		</div>
	</section>

	<footer
		id="contact"
		class="flex flex-col items-center justify-center border-t border-slate-300 px-6 text-center pb-10"
	>
		<img
			src="assets/images/logo.jpeg"
			alt="Wo Hu logo"
			class="h-full w-full object-contain"
		/>
		<div class="mt-14 flex items-center space-x-8 gap-10 text-slate-700">
			<a
				href="https://instagram.com/wohu.tattoo"
				target="_blank"
				rel="noreferrer"
				aria-label="Instagram"
				class="inline-flex items-center"
			>
				<svg
					xmlns="http://www.w3.org/2000/svg"
					width="28"
					height="28"
					fill="currentColor"
					viewBox="0 0 16 16"
					aria-hidden="true"
          					class="size-16"

				>
					<path
						d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.9 3.9 0 0 0-1.417.923A3.9 3.9 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.9 3.9 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.9 3.9 0 0 0-.923-1.417A3.9 3.9 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599s.453.546.598.92c.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.5 2.5 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.5 2.5 0 0 1-.92-.598 2.5 2.5 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233s.008-2.388.046-3.231c.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92s.546-.453.92-.598c.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92m-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217m0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334"
					/>
				</svg>
			</a>
			<a
				routerLink="/phone"
				aria-label="Text message"
				class="inline-flex items-center"
				><svg
					xmlns="http://www.w3.org/2000/svg"
					fill="none"
					viewBox="0 0 24 24"
					stroke-width="1.5"
					stroke="currentColor"
					class="size-20"
					aria-hidden="true"
				>
					<path
						stroke-linecap="round"
						stroke-linejoin="round"
						d="M2.25 12.76c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.076-4.076a1.526 1.526 0 0 1 1.037-.443 48.282 48.282 0 0 0 5.68-.494c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z"
					/>
				</svg></a
			>
		</div>
		<p class="mt-10 text-sm uppercase tracking-[0.12em] text-slate-500"
			>© 2026 Wo Hu Tattoos. All rights reserved.</p
		>
	</footer>
</div>
